apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.26
        env: 
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_MESSAGE
        ports:
        - containerPort: 80
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - '[ -n "$APP_MESSAGE" ]'
          initialDelaySeconds: 5
          periodSeconds: 5

